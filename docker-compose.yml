version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: meu_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword   # Defina uma senha forte para o root
      MYSQL_DATABASE: meubanco             # Banco inicial opcional
      MYSQL_USER: usuario                   # Usuário adicional opcional
      MYSQL_PASSWORD: senha123              # Senha do usuário adicional
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - phpmyadmin_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: meu_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db               # Nome do serviço do MySQL
      PMA_PORT: 3306
      PMA_USER: root             # Usuário para login no phpMyAdmin
      PMA_PASSWORD: rootpassword # Senha do root definida acima
    ports:
      - "8080:80"                # Acesse phpMyAdmin em http://localhost:8080
    depends_on:
      - db
    networks:
      - phpmyadmin_network

volumes:
  db_data:

networks:
  phpmyadmin_network: